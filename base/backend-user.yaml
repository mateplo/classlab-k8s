# API utilisateurs/auth (Node/Sequelize). Postgres via le Secret généré par CNPG
# (udagram-db-app) ; JWT via le SealedSecret udagram-jwt. sync-wave 1 = après la base.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-user
  labels:
    app: backend-user
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-user
  template:
    metadata:
      labels:
        app: backend-user
    spec:
      containers:
        - name: backend-user
          image: ghcr.io/mateplo/udagram-restapi-user:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          env:
            - name: PORT
              value: "8080"
            - name: URL
              valueFrom: { configMapKeyRef: { name: app-env, key: URL } }
            - name: POSTGRES_HOST
              value: udagram-db-rw
            - name: POSTGRES_DATABASE
              valueFrom: { secretKeyRef: { name: udagram-db-app, key: dbname } }
            - name: POSTGRES_USERNAME
              valueFrom: { secretKeyRef: { name: udagram-db-app, key: username } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: udagram-db-app, key: password } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: udagram-jwt, key: JWT_SECRET } }
---
apiVersion: v1
kind: Service
metadata:
  name: backend-user
  labels:
    app: backend-user
spec:
  selector:
    app: backend-user
  ports:
    - name: http
      port: 8080
      targetPort: 8080
