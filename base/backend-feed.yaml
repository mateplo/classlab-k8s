# API feed/posts (Node/Sequelize). Même base Postgres que backend-user (partagée),
# + AWS S3 pour les médias (différé : AWS_PROFILE=DEPLOYED, upload KO pour l'instant).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-feed
  labels:
    app: backend-feed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-feed
  template:
    metadata:
      labels:
        app: backend-feed
    spec:
      containers:
        - name: backend-feed
          image: ghcr.io/mateplo/udagram-restapi-feed:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          env:
            - name: PORT
              value: "8080"
            - name: URL
              valueFrom: { configMapKeyRef: { name: app-env, key: URL } }
            - name: AWS_PROFILE
              valueFrom: { configMapKeyRef: { name: app-env, key: AWS_PROFILE } }
            - name: AWS_REGION
              valueFrom: { configMapKeyRef: { name: app-env, key: AWS_REGION } }
            - name: AWS_MEDIA_BUCKET
              valueFrom: { configMapKeyRef: { name: app-env, key: AWS_MEDIA_BUCKET } }
            - name: POSTGRES_HOST
              value: udagram-db-rw
            - name: POSTGRES_DATABASE
              valueFrom: { secretKeyRef: { name: udagram-db-app, key: dbname } }
            - name: POSTGRES_USERNAME
              valueFrom: { secretKeyRef: { name: udagram-db-app, key: username } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: udagram-db-app, key: password } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: udagram-jwt, key: JWT_SECRET } }
---
apiVersion: v1
kind: Service
metadata:
  name: backend-feed
  labels:
    app: backend-feed
spec:
  selector:
    app: backend-feed
  ports:
    - port: 8080
      targetPort: 8080
