# Reverseproxy = nginx stock + conf montée depuis un ConfigMap (une image de moins à
# builder/surveiller). Route /api/v0/{users,feed,imagefilter} vers les backends par
# leur nom de Service (résolution DNS cluster). error_log passé de `debug` à `warn`
# (le module debug n'est pas dans l'image nginx stock -> sinon nginx refuse de démarrer).
apiVersion: v1
kind: ConfigMap
metadata:
  name: reverseproxy-nginx
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 1024; }
    error_log /dev/stdout warn;

    http {
        sendfile on;

        upstream user        { server backend-user:8080; }
        upstream feed        { server backend-feed:8080; }
        upstream imagefilter { server backend-image-filter:8080; }

        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host $server_name;

        server {
            listen 8080;
            location /api/v0/feed        { proxy_pass http://feed; }
            location /api/v0/users       { proxy_pass http://user; }
            location /api/v0/imagefilter { proxy_pass http://imagefilter; }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reverseproxy
  labels:
    app: reverseproxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reverseproxy
  template:
    metadata:
      labels:
        app: reverseproxy
    spec:
      containers:
        - name: reverseproxy
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
      volumes:
        - name: nginx-conf
          configMap:
            name: reverseproxy-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: reverseproxy
  labels:
    app: reverseproxy
spec:
  selector:
    app: reverseproxy
  ports:
    - port: 8080
      targetPort: 8080
