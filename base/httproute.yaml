# Expose l'app via le Gateway partagé `classlab` (ns kube-system, listener https 8443,
# TLS wildcard *.classlab.lan). Split par chemin :
#   /api/v0/*  -> reverseproxy:8080 (qui route vers les backends)
#   /          -> frontend:80
# hostname = valeur par défaut (prod) ; patché par overlay pour dev/staging.
# group/kind/weight déclarés explicitement pour éviter la dérive ArgoCD.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: udagram
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: classlab
      namespace: kube-system
      sectionName: https
  hostnames:
    - udagram.classlab.lan
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v0
      backendRefs:
        - group: ""
          kind: Service
          name: reverseproxy
          port: 8080
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: frontend
          port: 80
          weight: 1
